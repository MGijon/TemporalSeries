name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  publish:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --all

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish
